name: Deploy Porabot to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Update the bot's source code
            cd ${{ secrets.PROJECT_PATH }}
            git pull origin main
            
            # 2. Switch to your orchestrator directory to restart the containers
            cd ${{ secrets.ORCHESTRATOR_PATH }}
            docker-compose up -d --build
